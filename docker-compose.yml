services:
  app:
    build: .
    ports:
      - 8080:3000
    environment:
      MONGO_URI: mongodb://host.docker.internal:27017/
    depends_on:
      - mongo

  web:
    hostname: mongoDB

  mongo:
    image: mongo:7
    ports:
      - 27017:27017

    volumes:
      - mongo-data:/data/db
  
volumes:
  mongo-data: